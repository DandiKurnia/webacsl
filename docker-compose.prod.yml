services:
  postgres:
    image: postgres:16-alpine
    container_name: webacsl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webacsl
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/dandikurnia/webacsl:latest
    container_name: webacsl_app
    restart: unless-stopped
    ports:
      - "3005:3000" # Port eksternal diarahkan ke 3080 sesuai port dev lokal Anda
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webacsl # Diubah ke database webacsl
      NODE_ENV: production
      # Diarahkan ke IP MinIO server yang sudah aktif di port 9000
      MINIO_ENDPOINT: http://10.254.200.211:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://10.254.200.211:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-webacsl}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SESSION_SECRET: ${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
    driver: local
